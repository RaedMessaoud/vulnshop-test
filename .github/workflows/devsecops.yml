name: DevSecOps Pipeline 🔒

on:
  push:
    branches: 
      - main
      - master
      - develop
  pull_request:
    branches: 
      - main
  workflow_dispatch:
    inputs:
      docker_username:
        description: 'Docker Username (optional - for testing)'
        required: false
        default: ''
      docker_password:
        description: 'Docker Password/Token (optional - for testing)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning & Analysis
    timeout-minutes: 3
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pytest requests
    
    # ==================================================================
    # PHASE 1: SAST - Static Application Security Testing (Bandit)
    # ==================================================================
    - name: 🔍 SAST - Run Bandit Security Scan
      id: bandit
      run: |
        echo "🔍 Scanning Python code for vulnerabilities..."
        bandit -r shop_vuln.py -f json -o bandit-report.json || true
        echo "✅ Bandit scan completed"
        
        # Display summary
        if [ -f bandit-report.json ]; then
          echo ""
          echo "📊 Bandit Results:"
          cat bandit-report.json | python -m json.tool | head -30
        fi
      continue-on-error: true
    
    # ==================================================================
    # PHASE 2: SCA - Software Composition Analysis (Safety)
    # ==================================================================
    - name: 📦 SCA - Check Dependencies with Safety
      id: safety
      run: |
        echo "📦 Checking for vulnerable dependencies..."
        safety check -r requirements.txt --json > safety-report.json 2>&1 || true
        safety check -r requirements.txt > safety-output.txt 2>&1 || true
        echo "✅ Safety check completed"
        
        # Display summary
        if [ -f safety-output.txt ]; then
          echo ""
          echo "📊 Safety Results:"
          cat safety-output.txt | head -20
        fi
      continue-on-error: true
    
    # ==================================================================
    # PHASE 3: DAST - Dynamic Application Security Testing
    # ==================================================================
    - name: 🚀 Start Flask Application
      id: app-start
      run: |
        timeout 25 python shop_vuln.py > app.log 2>&1 &
        for i in {1..5}; do
          curl -s -m 1 http://localhost:5000/ > /dev/null 2>&1 && break
          sleep 0.5
        done
        echo "✅ Application started"
      continue-on-error: true
    
    - name: 🧪 DAST - Dynamic Security Tests
      id: dast
      run: |
        timeout 45 python -m pytest .github/workflows/test_security.py -v --tb=line -q 2>&1 || true
        echo "✅ Tests completed"
      continue-on-error: true
    
    - name: 🔐 DAST - Quick Security Checks
      id: dast-advanced
      run: |
        echo "🔐 Quick security checks..."
        DAST_RESULTS="dast-results.txt"
        > "$DAST_RESULTS"
        
        timeout 2 curl -s -m 1 -X POST "http://localhost:5000/login" -d "username=admin&password=test" | grep -q "profil\|dashboard" && echo "⚠️ Potential auth bypass" >> "$DAST_RESULTS" || echo "✅ Auth seems protected" >> "$DAST_RESULTS"
        timeout 2 curl -s -m 1 "http://localhost:5000/profile" -w "%{http_code}" | grep -q "200" && echo "⚠️ Profile may be accessible" >> "$DAST_RESULTS" || echo "✅ Profile protected" >> "$DAST_RESULTS"
        
        cat "$DAST_RESULTS"
      continue-on-error: true
    
    # ==================================================================
    # PHASE 4: Generate Security Report
    # ==================================================================
    - name: 📊 Generate Security Report
      id: report
      run: |
        timeout 20 python generate_report.py 2>&1 || echo "Report generation skipped"
      continue-on-error: true
    
    - name: 📄 Display Security Report
      if: always()
      run: |
        echo "========================================="
        echo "📋 COMPLETE SECURITY REPORT"
        echo "========================================="
        if [ -f "SECURITY_REPORT.md" ]; then
          cat SECURITY_REPORT.md
        else
          echo "⚠️ Report file not found"
        fi
        echo "========================================="
        echo ""
        echo "📊 Detailed Results:"
        echo ""
        
        if [ -f "bandit-report.json" ]; then
          echo "🔍 SAST Results:"
          cat bandit-report.json | python -m json.tool | head -50
          echo ""
        fi
        
        if [ -f "dast-vulnerabilities.txt" ]; then
          echo "🧪 DAST Vulnerabilities:"
          cat dast-vulnerabilities.txt
          echo ""
        fi
    
    # ==================================================================
    # PHASE 5: Artifact Upload
    # ==================================================================
    - name: 📤 Upload Security Reports & Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ github.run_number }}
        path: |
          bandit-report.json
          safety-report.json
          safety-output.txt
          dast-results.txt
          dast-vulnerabilities.txt
          dast-test-results.txt
          SECURITY_REPORT.md
          app.log
          pytest-output.log
        if-no-files-found: warn
        retention-days: 30
    
    # ==================================================================
    # PHASE 6: Summary
    # ==================================================================
    - name: 🎯 Pipeline Summary & Vulnerabilities Found
      if: always()
      run: |
        echo ""
        echo "========================================="
        echo "✅ DEVSECOPS PIPELINE EXECUTION SUMMARY"
        echo "========================================="
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Triggered: ${{ github.event_name }}"
        echo "========================================="
        echo ""
        echo "📊 Scan Results:"
        echo "  ✅ SAST (Bandit) - Status: ${{ steps.bandit.outcome }}"
        echo "  ✅ SCA (Safety) - Status: ${{ steps.safety.outcome }}"
        echo "  ✅ DAST (Dynamic Tests) - Status: ${{ steps.dast.outcome }}"
        echo "  ✅ DAST Advanced - Status: ${{ steps.dast-advanced.outcome }}"
        echo "  ✅ Report Generated - Status: ${{ steps.report.outcome }}"
        echo ""
        
        # Count total vulnerabilities
        if [ -f "SECURITY_REPORT.md" ]; then
          echo "📈 Vulnerability Summary from Report:"
          grep -E "🔴 Critical|🟠 High|🟡 Medium|🟢 Low|Total" SECURITY_REPORT.md | grep -E "^\|" | head -6 || echo "See full report in artifacts"
        fi
        
        echo ""
        echo "⚠️ VULNERABILITIES FOUND:"
        echo ""
        
        # Check Bandit results
        if [ -f "bandit-report.json" ]; then
          BANDIT_COUNT=$(python -c "import json; d=json.load(open('bandit-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "?")
          echo "  🔍 SAST Issues found: $BANDIT_COUNT"
        fi
        
        # Check DAST vulnerabilities
        if [ -f "dast-vulnerabilities.txt" ]; then
          DAST_COUNT=$(grep -c "^[0-9]\\." dast-vulnerabilities.txt 2>/dev/null || echo "0")
          if [ "$DAST_COUNT" -gt "0" ]; then
            echo "  🧪 DAST Vulnerabilities found: $DAST_COUNT"
            echo ""
            grep "^[0-9]\\." dast-vulnerabilities.txt | sed 's/^/     /'
          fi
        fi
        
        echo ""
        echo "📁 Artifacts available for download"
        echo "🔗 Check 'Artifacts' tab in GitHub Actions"
        echo "========================================="

  # ==================================================================
  # JOB 2: Docker Image Build & Push
  # ==================================================================
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: needs.security-scan.result == 'success' && (github.event.inputs.docker_username != '' || secrets.DOCKER_USERNAME != '')
    timeout-minutes: 10
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ✅ Verify Docker Credentials
      run: |
        # Check if using workflow inputs (manual trigger) or secrets
        USERNAME="${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}"
        PASSWORD="${{ github.event.inputs.docker_password || secrets.DOCKER_PASSWORD }}"
        
        if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
          echo "⚠️ Docker credentials not found"
          echo "Usage:"
          echo "  Option 1: Go to GitHub Settings → Secrets → Add DOCKER_USERNAME & DOCKER_PASSWORD"
          echo "  Option 2: Go to Actions → Run workflow → Fill in the inputs"
          exit 1
        fi
        echo "✅ Docker credentials found"
      continue-on-error: true
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}
        password: ${{ github.event.inputs.docker_password || secrets.DOCKER_PASSWORD }}
    
    - name: 📦 Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event.inputs.docker_username != '' || secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}/vulnshop:latest
          ${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}/vulnshop:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true
    
    - name: 📋 Build Status
      run: |
        echo "========================================="
        echo "🐳 DOCKER BUILD COMPLETED"
        echo "========================================="
        USERNAME="${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}"
        if [ ! -z "$USERNAME" ]; then
          echo "✅ Status: Image built and pushed"
          echo "📍 Repository: $USERNAME/vulnshop"
          echo "🏷️  Tags:"
          echo "   - latest"
          echo "   - ${{ github.sha }}"
        else
          echo "⚠️ Status: Build completed (no credentials, image not pushed)"
        fi
        echo "========================================="