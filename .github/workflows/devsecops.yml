name: DevSecOps Pipeline 🔒

on:
  push:
    branches: 
      - main
      - master
      - develop
  pull_request:
    branches: 
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning & Analysis
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pytest requests
    
    # ==================================================================
    # PHASE 1: SAST - Static Application Security Testing (Bandit)
    # ==================================================================
    - name: 🔍 SAST - Run Bandit Security Scan
      id: bandit
      run: |
        echo "🔍 Scanning Python code for vulnerabilities..."
        bandit -r shop_vuln.py -f json -o bandit-report.json || true
        echo "✅ Bandit scan completed"
        
        # Display summary
        if [ -f bandit-report.json ]; then
          echo ""
          echo "📊 Bandit Results:"
          cat bandit-report.json | python -m json.tool | head -30
        fi
      continue-on-error: true
    
    # ==================================================================
    # PHASE 2: SCA - Software Composition Analysis (Safety)
    # ==================================================================
    - name: 📦 SCA - Check Dependencies with Safety
      id: safety
      run: |
        echo "📦 Checking for vulnerable dependencies..."
        safety check -r requirements.txt --json > safety-report.json 2>&1 || true
        safety check -r requirements.txt > safety-output.txt 2>&1 || true
        echo "✅ Safety check completed"
        
        # Display summary
        if [ -f safety-output.txt ]; then
          echo ""
          echo "📊 Safety Results:"
          cat safety-output.txt | head -20
        fi
      continue-on-error: true
    
    # ==================================================================
    # PHASE 3: DAST - Dynamic Application Security Testing
    # ==================================================================
    - name: 🚀 Start Flask Application
      id: app-start
      run: |
        echo "🚀 Starting Flask application on port 5000..."
        nohup python shop_vuln.py > app.log 2>&1 &
        APP_PID=$!
        echo "  PID: $APP_PID"
        
        # Wait for app to be ready (faster timeout)
        for i in {1..15}; do
          if timeout 2 curl -s http://localhost:5000/ > /dev/null 2>&1; then
            echo "✅ Application is responding on port 5000"
            break
          fi
          echo "⏳ Waiting for application... (attempt $i/15)"
          sleep 1
        done
        
        # Check if app is running (but continue anyway for DAST)
        if curl -s http://localhost:5000/ > /dev/null 2>&1; then
          echo "✅ Application ready for DAST testing"
          echo "app_status=ready" >> $GITHUB_ENV
        else
          echo "⚠️ Application may have issues, continu anyway for vulnerability detection"
          echo "app_status=error" >> $GITHUB_ENV
        fi
      continue-on-error: true
    
    - name: 🧪 DAST - Dynamic Security Tests
      id: dast
      run: |
        echo "🧪 Running dynamic security tests..."
        timeout 60 python -m pytest .github/workflows/test_security.py -v --tb=short -x || true
        echo "✅ Dynamic tests completed"
        # Display collected vulnerabilities
        if [ -f "dast-vulnerabilities.txt" ]; then
          echo ""
          echo "📊 DAST Findings:"
          cat dast-vulnerabilities.txt
        fi
      continue-on-error: true
    
    - name: 🔐 DAST - Advanced SQL Injection Tests
      id: dast-advanced
      run: |
        echo "========================================="
        echo "🎯 ADVANCED DYNAMIC SECURITY TESTS"
        echo "========================================="
        
        DAST_RESULTS="dast-results.txt"
        > "$DAST_RESULTS"
        
        # Test 1: Login SQL Injection
        echo "Test 1: Login SQL Injection Bypass..."
        LOGIN_RESPONSE=$(timeout 5 curl -s -X POST "http://localhost:5000/login" \
          -d "username=admin&password=%27%20OR%20%271%27%3D%271" \
          --connect-timeout 3 \
          --max-time 5)
        
        if echo "$LOGIN_RESPONSE" | grep -qi "profil\|dashboard\|welcome"; then
          echo "❌ VULNERABILITY: SQL Injection allows login bypass" | tee -a "$DAST_RESULTS"
        else
          echo "✅ SQL injection protection: Login secure" | tee -a "$DAST_RESULTS"
        fi
        
        # Test 2: UNION-Based SQL Injection
        echo ""
        echo "Test 2: UNION-based SQL Injection..."
        UNION_RESPONSE=$(timeout 5 curl -s "http://localhost:5000/search?q=%27%20UNION%20SELECT%201,2,3,4--" \
          --connect-timeout 3 \
          --max-time 5 2>/dev/null || echo "")
        
        if [ ! -z "$UNION_RESPONSE" ] && echo "$UNION_RESPONSE" | grep -qi "error\|syntax"; then
          echo "✅ UNION injection detection: Protected" | tee -a "$DAST_RESULTS"
        else
          echo "⚠️ UNION injection: Further analysis needed" | tee -a "$DAST_RESULTS"
        fi
        
        # Test 3: Authentication Bypass
        echo ""
        echo "Test 3: Direct Profile Access Without Authentication..."
        PROFILE_RESPONSE=$(timeout 5 curl -s -w "\nHTTP_CODE:%{http_code}" "http://localhost:5000/profile" \
          --connect-timeout 3 \
          --max-time 5 2>/dev/null || echo "")
        
        HTTP_CODE=$(echo "$PROFILE_RESPONSE" | grep "HTTP_CODE" | cut -d: -f2)
        if [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "301" ]; then
          echo "✅ Profile access protected (redirect)" | tee -a "$DAST_RESULTS"
        elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
          echo "✅ Profile access protected (denied)" | tee -a "$DAST_RESULTS"
        else
          echo "❌ VULNERABILITY: Profile access not properly protected" | tee -a "$DAST_RESULTS"
        fi
        
        echo ""
        echo "========================================="
        echo "✅ DAST completed - Results saved"
        echo "========================================="
      continue-on-error: true
    
    # ==================================================================
    # PHASE 4: Generate Security Report
    # ==================================================================
    - name: 📊 Generate Security Report
      id: report
      run: |
        echo "📊 Generating comprehensive security report..."
        python generate_report.py
      continue-on-error: true
    
    - name: 📄 Display Security Report
      if: always()
      run: |
        echo "========================================="
        echo "📋 COMPLETE SECURITY REPORT"
        echo "========================================="
        if [ -f "SECURITY_REPORT.md" ]; then
          cat SECURITY_REPORT.md
        else
          echo "⚠️ Report file not found"
        fi
        echo "========================================="
        echo ""
        echo "📊 Detailed Results:"
        echo ""
        
        if [ -f "bandit-report.json" ]; then
          echo "🔍 SAST Results:"
          cat bandit-report.json | python -m json.tool | head -50
          echo ""
        fi
        
        if [ -f "dast-vulnerabilities.txt" ]; then
          echo "🧪 DAST Vulnerabilities:"
          cat dast-vulnerabilities.txt
          echo ""
        fi
    
    # ==================================================================
    # PHASE 5: Artifact Upload
    # ==================================================================
    - name: 📤 Upload Security Reports & Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ github.run_number }}
        path: |
          bandit-report.json
          safety-report.json
          safety-output.txt
          dast-results.txt
          dast-vulnerabilities.txt
          dast-test-results.txt
          SECURITY_REPORT.md
          app.log
          pytest-output.log
        if-no-files-found: warn
        retention-days: 30
    
    # ==================================================================
    # PHASE 6: Summary
    # ==================================================================
    - name: 🎯 Pipeline Summary & Vulnerabilities Found
      if: always()
      run: |
        echo ""
        echo "========================================="
        echo "✅ DEVSECOPS PIPELINE EXECUTION SUMMARY"
        echo "========================================="
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Triggered: ${{ github.event_name }}"
        echo "========================================="
        echo ""
        echo "📊 Scan Results:"
        echo "  ✅ SAST (Bandit) - Status: ${{ steps.bandit.outcome }}"
        echo "  ✅ SCA (Safety) - Status: ${{ steps.safety.outcome }}"
        echo "  ✅ DAST (Dynamic Tests) - Status: ${{ steps.dast.outcome }}"
        echo "  ✅ DAST Advanced - Status: ${{ steps.dast-advanced.outcome }}"
        echo "  ✅ Report Generated - Status: ${{ steps.report.outcome }}"
        echo ""
        
        # Count total vulnerabilities
        if [ -f "SECURITY_REPORT.md" ]; then
          echo "📈 Vulnerability Summary from Report:"
          grep -E "🔴 Critical|🟠 High|🟡 Medium|🟢 Low|Total" SECURITY_REPORT.md | grep -E "^\|" | head -6 || echo "See full report in artifacts"
        fi
        
        echo ""
        echo "⚠️ VULNERABILITIES FOUND:"
        echo ""
        
        # Check Bandit results
        if [ -f "bandit-report.json" ]; then
          BANDIT_COUNT=$(python -c "import json; d=json.load(open('bandit-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "?")
          echo "  🔍 SAST Issues found: $BANDIT_COUNT"
        fi
        
        # Check DAST vulnerabilities
        if [ -f "dast-vulnerabilities.txt" ]; then
          DAST_COUNT=$(grep -c "^[0-9]\\." dast-vulnerabilities.txt 2>/dev/null || echo "0")
          if [ "$DAST_COUNT" -gt "0" ]; then
            echo "  🧪 DAST Vulnerabilities found: $DAST_COUNT"
            echo ""
            grep "^[0-9]\\." dast-vulnerabilities.txt | sed 's/^/     /'
          fi
        fi
        
        echo ""
        echo "📁 Artifacts available for download"
        echo "🔗 Check 'Artifacts' tab in GitHub Actions"
        echo "========================================="

  # ==================================================================
  # JOB 2: Docker Image Build
  # ==================================================================
  docker-build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: success()
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: secrets.DOCKER_USERNAME != ''
      continue-on-error: true
    
    - name: 📦 Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ secrets.DOCKER_USERNAME != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/vulnshop:latest
          ${{ secrets.DOCKER_USERNAME }}/vulnshop:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      if: secrets.DOCKER_USERNAME != ''
      continue-on-error: true
    
    - name: 📦 Build Local Docker Image (without push)
      run: |
        echo "🐳 Building Docker image..."
        docker build -t vulnshop:latest .
        echo "✅ Docker image built successfully"
        
        echo ""
        echo "📊 Image Information:"
        docker images vulnshop:latest
        
        echo ""
        echo "💾 Image size:"
        docker images vulnshop:latest --format "{{.Size}}"
      if: secrets.DOCKER_USERNAME == ''
    
    - name: 🧪 Test Docker Image (optional)
      run: |
        echo "🧪 Testing Docker image..."
        
        # Run container in background
        docker run -d -p 5000:5000 --name vulnshop-test vulnshop:latest
        
        # Wait for container to start
        for i in {1..10}; do
          if curl -s http://localhost:5000/ > /dev/null 2>&1; then
            echo "✅ Container is running and responding"
            break
          fi
          echo "⏳ Waiting for container... (attempt $i/10)"
          sleep 1
        done
        
        # Test basic endpoint
        if curl -s http://localhost:5000/ | grep -q "Shop\|Vuln\|Home"; then
          echo "✅ Container test passed"
        else
          echo "⚠️ Container may have issues"
        fi
        
        # Cleanup
        docker stop vulnshop-test || true
        docker rm vulnshop-test || true
      continue-on-error: true
    
    - name: 📊 Final Status
      if: always()
      run: |
        echo "========================================="
        echo "🐳 DOCKER BUILD JOB COMPLETED"
        echo "========================================="
        echo ""
        echo "📋 Details:"
        if [ "${{ secrets.DOCKER_USERNAME }}" != "" ]; then
          echo "  Repository: ${{ secrets.DOCKER_USERNAME }}/vulnshop"
          echo "  Tags: latest, ${{ github.sha }}"
          echo "  Status: Pushed to Docker Hub ✅"
        else
          echo "  Status: Local build only (no Docker Hub credentials)"
          echo "  💡 Tip: Add DOCKER_USERNAME & DOCKER_PASSWORD secrets to enable push"
        fi
        echo ""
        echo "========================================="