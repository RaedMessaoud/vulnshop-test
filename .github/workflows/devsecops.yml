name: DevSecOps Pipeline 🔒

on:
  push:
    branches: 
      - main
      - master
      - develop
  pull_request:
    branches: 
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning & Analysis
    timeout-minutes: 5
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pytest requests
    
    # ==================================================================
    # PHASE 1: SAST - Static Analysis (Bandit)
    # ==================================================================
    - name: 🔍 Phase 1 - SAST (Bandit)
      id: bandit
      run: |
        echo "🔍 SAST - Scanning with Bandit..."
        bandit -r shop_vuln.py -f json -o bandit-report.json || true
        echo "✅ SAST completed"
      continue-on-error: true
    
    # ==================================================================
    # PHASE 2: SCA - Dependency Check (Safety)
    # ==================================================================
    - name: 📦 Phase 2 - SCA (Safety)
      id: safety
      run: |
        echo "📦 SCA - Checking dependencies..."
        safety check -r requirements.txt --json > safety-report.json 2>&1 || true
        safety check -r requirements.txt > safety-output.txt 2>&1 || true
        echo "✅ SCA completed"
      continue-on-error: true
    
    # ==================================================================
    # PHASE 3: DAST - Dynamic Testing
    # ==================================================================
    - name: 🧪 Phase 3 - DAST (Start App)
      run: |
        echo "🚀 Starting app for DAST..."
        timeout 20 python shop_vuln.py > app.log 2>&1 &
        sleep 2
        curl -s http://localhost:5000/ > /dev/null && echo "✅ App ready" || echo "⚠️ App slow"
      continue-on-error: true
    
    - name: 🧪 Phase 3 - DAST (Tests)
      run: |
        echo "🧪 Running basic security tests..."
        
        # Test 1: SQL Injection - Login
        echo "Test 1: SQL Injection attempt..."
        curl -s -X POST http://localhost:5000/login \
          -d "username=admin' OR '1'='1&password=test" | grep -q "profil\|dashboard" \
          && echo "⚠️ SQL Injection vulnerability found" || echo "✅ SQL Injection test completed"
        
        # Test 2: HTTP Security Headers
        echo "Test 2: Check HTTP headers..."
        curl -s -I http://localhost:5000/ | grep -q "X-Content-Type-Options\|X-Frame-Options" \
          && echo "✅ Security headers present" || echo "ℹ️ Limited security headers"
        
        # Test 3: Auth bypass
        echo "Test 3: Authentication bypass..."
        curl -s http://localhost:5000/profile 2>/dev/null | grep -q "login\|auth" \
          && echo "✅ Auth required" || echo "⚠️ Profile may be accessible without auth"
        
        echo "" > dast-results.txt
        echo "✅ DAST tests completed" >> dast-results.txt
      continue-on-error: true
    
    # ==================================================================
    # PHASE 4: BUILD - Docker Image
    # ==================================================================
    - name: 🐳 Phase 4 - BUILD (Docker)
      id: build
      run: |
        echo "🐳 Building Docker image..."
        docker build -t vulnshop:${{ github.sha }} -t vulnshop:latest . > docker-build.log 2>&1
        echo "✅ Docker image built successfully"
        echo "Docker build completed" > build-report.txt
      continue-on-error: true
    
    # ==================================================================
    # PHASE 5: IMAGE SCAN - Trivy
    # ==================================================================
    - name: 🔍 Phase 5 - IMAGE SCAN (Trivy)
      id: trivy
      run: |
        echo "📦 Installing Trivy..."
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        
        echo "🔍 Scanning Docker image with Trivy..."
        trivy image --format json -o trivy-report.json vulnshop:${{ github.sha }} || true
        trivy image --severity HIGH,CRITICAL vulnshop:${{ github.sha }} > trivy-summary.txt || true
        echo "✅ Trivy scan completed"
      continue-on-error: true
    
    # ==================================================================
    # PHASE 6: DEPLOY - Push Image
    # ==================================================================
    - name: 📤 Phase 6 - DEPLOY (Image Archive)
      id: deploy
      run: |
        echo "📤 Preparing image for deployment..."
        docker save vulnshop:${{ github.sha }} | gzip > docker-image.tar.gz
        echo "✅ Image archived"
        echo "Deployment ready" > deploy-report.txt
      continue-on-error: true
    
    # ==================================================================
    # PHASE 7: MONITORING - Logs Collection
    # ==================================================================
    - name: 📊 Phase 7 - MONITORING (Logs)
      run: |
        echo "📊 Collecting monitoring data..."
        echo "## 📊 Monitoring Report" > monitoring-report.md
        echo "**Run ID:** ${{ github.run_id }}" >> monitoring-report.md
        echo "**Timestamp:** $(date)" >> monitoring-report.md
        echo "**Commit:** ${{ github.sha }}" >> monitoring-report.md
        echo "" >> monitoring-report.md
        
        if [ -f app.log ]; then
          echo "### Application Logs:" >> monitoring-report.md
          head -20 app.log >> monitoring-report.md
        fi
        
        echo "✅ Monitoring report generated"
      continue-on-error: true
    
    # ==================================================================
    # FINAL: Upload Artifacts
    # ==================================================================
    - name: 📤 Upload All Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ github.run_number }}
        path: |
          bandit-report.json
          safety-report.json
          safety-output.txt
          dast-results.txt
          docker-build.log
          trivy-report.json
          trivy-summary.txt
          monitoring-report.md
          app.log
          build-report.txt
          deploy-report.txt
          docker-image.tar.gz
        retention-days: 30
    
    # ==================================================================
    # FINAL: Summary
    # ==================================================================
    - name: 📋 Pipeline Summary
      if: always()
      run: |
        echo ""
        echo "╔════════════════════════════════════════╗"
        echo "║  ✅ DEVSECOPS PIPELINE COMPLETED      ║"
        echo "╚════════════════════════════════════════╝"
        echo ""
        echo "📊 Phases Executed:"
        echo "  ✅ Phase 1: SAST (Bandit)"
        echo "  ✅ Phase 2: SCA (Safety)"
        echo "  ✅ Phase 3: DAST (Dynamic Tests)"
        echo "  ✅ Phase 4: BUILD (Docker)"
        echo "  ✅ Phase 5: IMAGE SCAN (Trivy)"
        echo "  ✅ Phase 6: DEPLOY (Archive)"
        echo "  ✅ Phase 7: MONITORING (Logs)"
        echo ""
        echo "📁 All reports uploaded to Artifacts"
        echo "🔗 GitHub Actions > Artifacts > security-reports-${{ github.run_number }}"
        echo ""